<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お申し込み受付完了 | WS PARTNERS</title>
  <link rel="icon" type="image/png" href="images/favicon_wsp_logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark:       #041434;
      --accent-orange: #f39c12;
      --primary:       #0050b3;
      --secondary:     #00dfd8;
      --text-main:     #1a202c;
      --text-muted:    #4a5568;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      color: #fff;
      text-align: center;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 56px 48px;
      max-width: 560px;
      width: 100%;
      color: var(--text-main);
      box-shadow: 0 25px 50px rgba(0,0,0,.3);
      animation: fadeUp .6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: none; }
    }

    .icon-check {
      width: 72px;
      height: 72px;
      background: var(--accent-orange);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon-check svg { width: 36px; height: 36px; }

    .card h1 {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--text-main);
      margin-bottom: 12px;
      line-height: 1.3;
    }
    .card .subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 28px;
      line-height: 1.7;
    }

    .info-box {
      background: #f4f7f9;
      border-radius: 12px;
      padding: 20px 24px;
      text-align: left;
      margin-bottom: 28px;
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.8;
    }
    .info-box strong { color: var(--text-main); }
    .info-box a { color: var(--primary); word-break: break-all; }

    .zoom-url {
      display: block;
      margin-top: 6px;
      font-weight: 700;
    }

    .zoom-notes {
      font-size: 0.8rem;
      color: #888;
      margin-top: 10px;
      white-space: pre-line;
    }

    .btn-return {
      display: inline-block;
      background: var(--accent-orange);
      color: #fff;
      font-weight: 900;
      font-size: 1rem;
      padding: 14px 36px;
      border-radius: 50px;
      text-decoration: none;
      transition: background .2s, transform .2s;
      box-shadow: 0 8px 20px rgba(243,156,18,.35);
    }
    .btn-return:hover {
      background: #d35400;
      transform: translateY(-2px);
    }

    .logo-wrap {
      margin-bottom: 28px;
    }
    .logo-wrap img { height: 44px; margin: 0 auto; }

    footer {
      margin-top: 28px;
      font-size: 0.8rem;
      color: rgba(255,255,255,.45);
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
      .card h1 { font-size: 1.3rem; }
    }
  </style>
  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);})(window,document,'script','dataLayer','GTM-TLGVMTDZ');</script>
  <!-- End Google Tag Manager -->
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TLGVMTDZ" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<div class="logo-wrap">
  <img src="images/logo_wsp.png" alt="WS PARTNERS" onerror="this.style.display='none'">
</div>

<div class="card">
  <div class="icon-check">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>

  <h1 id="card-title"></h1>
  <p class="subtitle" id="card-subtitle"></p>

  <div class="info-box">
    <p><strong id="zoom-heading"></strong></p>
    <p id="zoom-body" style="margin-top:4px;white-space:pre-line"></p>
    <a id="zoom-link"
       href="https://us02web.zoom.us/webinar/register/WN_pTmh02uZTwi2mPrLc49QCg"
       target="_blank" rel="noopener"
       class="zoom-url">https://us02web.zoom.us/webinar/register/WN_pTmh02uZTwi2mPrLc49QCg</a>
    <p class="zoom-notes" id="zoom-notes"></p>
    <br>
    <p><strong id="contact-title"></strong></p>
    <p style="margin-top:4px">
      WS PARTNERS PTE LTD<br>
      <a href="mailto:support@ws-partners.com.sg">support@ws-partners.com.sg</a><br>
      +65-6978-4066
    </p>
  </div>

  <a href="javascript:void(0)" onclick="goBackToLP()" class="btn-return" id="btn-return">LPページへ戻る</a>
</div>

<footer>
  &copy; WS PARTNERS PTE LTD. All rights reserved.
</footer>

<script>
  var i18n = {
    ja: {
      htmlLang:    'ja',
      title:       'お申し込みありがとうございます。',
      subtitle:    'ご登録いただいたインドネシア人受講者様のメールアドレスへ、受付完了メールを送信いたしました。',
      zoomHeading: 'Zoom事前登録',
      zoomBody:    '当日の視聴には、以下のURLからZoomへの事前登録が必要です。\nリンク先よりご登録をお願いいたします。',
      zoomNotes:   '※メールが届かない場合は、迷惑メールフォルダをご確認ください。\n※本案内は、日本人上司の方のメールアドレスには配信されません。',
      contactTitle: 'お問い合わせ',
      btnReturn:   'LPページへ戻る'
    },
    id: {
      htmlLang:    'id',
      title:       'Terima kasih atas pendaftaran Anda.',
      subtitle:    'Email konfirmasi penerimaan telah dikirimkan ke alamat email peserta Indonesia yang terdaftar.',
      zoomHeading: 'Pendaftaran Zoom',
      zoomBody:    'Untuk menonton pada hari acara, Anda perlu mendaftar terlebih dahulu melalui Zoom dengan menggunakan URL berikut.\nSilakan melanjutkan pendaftaran melalui tautan di bawah ini.',
      zoomNotes:   '※ Jika email tidak diterima, silakan periksa folder spam Anda.\n※ Informasi ini tidak dikirimkan ke alamat email atasan (staf Jepang).',
      contactTitle: 'Hubungi Kami',
      btnReturn:   'Kembali ke Halaman LP'
    }
  };

  (function () {
    var lang = (new URLSearchParams(window.location.search)).get('lang') || 'ja';
    var t    = i18n[lang] || i18n['ja'];

    document.documentElement.lang = t.htmlLang;

    document.getElementById('card-title').textContent    = t.title;
    document.getElementById('card-subtitle').textContent = t.subtitle;
    document.getElementById('zoom-heading').textContent  = t.zoomHeading;
    document.getElementById('zoom-body').textContent     = t.zoomBody;
    document.getElementById('zoom-notes').textContent    = t.zoomNotes;
    document.getElementById('contact-title').textContent = t.contactTitle;
    document.getElementById('btn-return').textContent    = t.btnReturn;
  })();

  function goBackToLP() {
    var ref = document.referrer;
    if (ref && ref !== window.location.href) {
      window.location.href = ref.split('#')[0];
    } else {
      history.back();
    }
  }
</script>
</body>
</html>
