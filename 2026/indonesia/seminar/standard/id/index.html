<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seminar Indonesia 2026 | WS PARTNERS</title>
  <link rel="icon" type="image/png" href="../images/favicon_wsp_logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans', sans-serif;
      background: #f4f7f9;
      color: #1a202c;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 600px;
      text-align: center;
    }
    .logo {
      height: 48px;
      margin-bottom: 32px;
    }
    .badge {
      display: inline-block;
      background: #0050b3;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }
    h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 900;
      color: #041434;
      line-height: 1.3;
      margin-bottom: 16px;
    }
    p {
      font-size: 1rem;
      color: #4a5568;
      line-height: 1.7;
      margin-bottom: 12px;
    }
    .btn {
      display: inline-block;
      margin-top: 24px;
      background: #0050b3;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      padding: 14px 32px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #003d8a; }
    .lang-link {
      display: block;
      margin-top: 16px;
      font-size: 0.85rem;
      color: #0050b3;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="../images/logo_wsp.png" alt="WS PARTNERS" class="logo">
    <div class="badge">Segera Hadir / Coming Soon</div>
    <h1>Halaman ini sedang<br>dalam persiapan</h1>
    <p>Halaman pendaftaran dalam Bahasa Indonesia sedang kami siapkan.</p>
    <p>Untuk mendaftar, silakan gunakan halaman bahasa Jepang atau hubungi kami langsung.</p>
    <a href="../ja/" class="btn">→ Lihat halaman bahasa Jepang</a>
    <a href="mailto:support@ws-partners.com.sg" class="lang-link">support@ws-partners.com.sg</a>
  </div>

</html>
