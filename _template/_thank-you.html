<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お申し込み受付完了 | WS PARTNERS</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark:       #041434;
      --accent-orange: #f39c12;
      --primary:       #0050b3;
      --secondary:     #00dfd8;
      --text-main:     #1a202c;
      --text-muted:    #4a5568;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      color: #fff;
      text-align: center;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 56px 48px;
      max-width: 560px;
      width: 100%;
      color: var(--text-main);
      box-shadow: 0 25px 50px rgba(0,0,0,.3);
      animation: fadeUp .6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: none; }
    }

    .icon-check {
      width: 72px;
      height: 72px;
      background: var(--accent-orange);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon-check svg { width: 36px; height: 36px; }

    .card h1 {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--text-main);
      margin-bottom: 12px;
      line-height: 1.3;
    }
    .card .subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 28px;
      line-height: 1.7;
    }

    .info-box {
      background: #f4f7f9;
      border-radius: 12px;
      padding: 20px 24px;
      text-align: left;
      margin-bottom: 28px;
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.8;
    }
    .info-box strong { color: var(--text-main); }

    .btn-return {
      display: inline-block;
      background: var(--accent-orange);
      color: #fff;
      font-weight: 900;
      font-size: 1rem;
      padding: 14px 36px;
      border-radius: 50px;
      text-decoration: none;
      transition: background .2s, transform .2s;
      box-shadow: 0 8px 20px rgba(243,156,18,.35);
    }
    .btn-return:hover {
      background: #d35400;
      transform: translateY(-2px);
    }

    .logo-wrap {
      margin-bottom: 28px;
    }
    .logo-wrap img { height: 44px; margin: 0 auto; }

    footer {
      margin-top: 28px;
      font-size: 0.8rem;
      color: rgba(255,255,255,.45);
    }

    /* --- GTM / Analytics trigger element --- */
    #conversion-trigger { display: none; }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
      .card h1 { font-size: 1.3rem; }
    }
  </style>
  <!-- Google Analytics or GTM should fire on this page to record conversion -->
</head>
<body>

<!-- Conversion trigger (hidden – for analytics) -->
<div id="conversion-trigger" data-event="form_submit_complete"></div>

<div class="logo-wrap">
  <img src="images/logo.png" alt="WS PARTNERS" onerror="this.style.display='none'">
</div>

<div class="card">
  <div class="icon-check">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>

  <h1 id="card-title">お申し込みを受け付けました</h1>

  <p class="subtitle" id="card-subtitle">
    フォームへのご入力ありがとうございます。<br>
    担当者より<strong>2〜3営業日以内</strong>にご連絡いたします。
  </p>

  <div class="info-box">
    <p><strong>確認メール</strong>について</p>
    <p>ご登録のメールアドレスに自動返信メールをお送りしています。届いていない場合は迷惑メールフォルダをご確認ください。</p>
    <br>
    <p><strong>お問い合わせ</strong></p>
    <p>
      WS PARTNERS PTE LTD<br>
      <a href="mailto:support@ws-partners.com.sg" style="color:var(--primary)">support@ws-partners.com.sg</a><br>
      +65-6978-4066
    </p>
  </div>

  <a href="javascript:history.back()" class="btn-return">LPページへ戻る</a>
</div>

<footer>
  &copy; WS PARTNERS PTE LTD. All rights reserved.
</footer>

<script>
  /* -------------------------------------------------------
     Analytics: fire a conversion event on page load
     GTM dataLayer push (uncomment if GTM is installed)
  ------------------------------------------------------- */
  // window.dataLayer = window.dataLayer || [];
  // window.dataLayer.push({ event: 'lp_form_complete' });

  /* Customise title/message via URL param ?prog=Horenso */
  (function() {
    var prog = new URLSearchParams(window.location.search).get('prog');
    if (prog) {
      var titleEl = document.getElementById('card-title');
      if (titleEl) titleEl.textContent = prog + 'のお申し込みを受け付けました';
    }
  })();
</script>
</body>
</html>
